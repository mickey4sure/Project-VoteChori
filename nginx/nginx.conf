# ==============================================================================
# nginx.conf — Project-VoteChori Production Blueprint
# Version: 2.0 | 2026-04-29
#
# Architecture:
#   Browser → Nginx :80/:443
#             ├─ /api/fact-check/stream → Express :5000  (SSE, strict limit)
#             ├─ /api/*                 → Express :5000  (general limit)
#             ├─ /health               → Express :5000  (no limit)
#             └─ /*                    → Next.js :3000  (frontend)
#
# Status: BLUEPRINT ONLY — not yet deployed.
#         Enable the HTTPS block and update server_name before going live.
# ==============================================================================

worker_processes  auto;                    # Match CPU core count automatically
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use                 epoll;             # Linux: efficient I/O event model
    multi_accept        on;               # Accept all pending connections at once
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Hide server identity ───────────────────────────────────────────────
    server_tokens off;                     # Remove "nginx/1.x.x" from headers

    # ── Custom access log with timing ──────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip              on;
    gzip_disable      "msie6";
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        font/truetype font/opentype image/svg+xml;

    # ── Slow-loris attack mitigations ─────────────────────────────────────
    client_body_timeout    12s;            # Abort if body takes > 12s to send
    client_header_timeout  12s;            # Abort if headers take > 12s
    send_timeout           10s;            # Abort if client stops reading
    client_max_body_size   16k;            # Hard cap on request body size

    # ── Rate limiting zones ────────────────────────────────────────────────
    # Zone 1 — General API traffic: 10 req/s per IP
    limit_req_zone  $binary_remote_addr  zone=api_general:10m   rate=10r/s;

    # Zone 2 — AI/SSE endpoint: 2 req/s per IP
    # The SSE stream calls Gemini API which has its own quota and costs money.
    # A strict zone prevents abuse from a single client.
    limit_req_zone  $binary_remote_addr  zone=api_ai_strict:10m  rate=2r/s;

    # Zone 3 — Connection tracking: limits concurrent open connections per IP
    limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

    # ── Upstream servers ───────────────────────────────────────────────────
    upstream nextjs_frontend {
        server 127.0.0.1:3000;
        keepalive 32;                      # Persistent connections to Next.js
    }

    upstream express_backend {
        server 127.0.0.1:5000;
        keepalive 16;                      # Persistent connections to Express
    }

    # ==========================================================================
    # HTTP server block
    # In production: redirect all HTTP to HTTPS (uncomment redirect below)
    # ==========================================================================
    server {
        listen       80;
        server_name  localhost;            # CHANGE: your-domain.com

        # ── Global connection cap ──────────────────────────────────────────
        limit_conn conn_limit 30;          # Max 30 concurrent connections per IP

        # ── Security headers (apply to ALL responses from this server) ─────
        add_header  X-Frame-Options            "DENY"                             always;
        add_header  X-Content-Type-Options     "nosniff"                          always;
        add_header  X-XSS-Protection           "1; mode=block"                    always;
        add_header  Referrer-Policy            "strict-origin-when-cross-origin"  always;
        add_header  Permissions-Policy         "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header  X-Request-ID               $request_id                        always;

        # Content Security Policy
        # Tighten 'unsafe-inline' and 'unsafe-eval' once the app is stable.
        add_header  Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-inline' 'unsafe-eval'; "
            "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; "
            "font-src 'self' https://fonts.gstatic.com; "
            "img-src 'self' data: https: blob:; "
            "connect-src 'self' http://localhost:5000 https://*.tile.openstreetmap.org; "
            "worker-src blob:; "
            "frame-ancestors 'none';"
            always;

        # ── Uncomment to force HTTPS in production ─────────────────────────
        # return 301 https://$host$request_uri;

        # ── Health check — no rate limit, no logging ──────────────────────
        location = /health {
            proxy_pass          http://express_backend;
            proxy_set_header    Host $host;
            access_log          off;       # Don't clutter logs with health polls
        }

        # ── SSE / AI Fact-Check endpoint (most restrictive) ───────────────
        # This location MUST be declared before the general /api/ block
        # so Nginx's longest-prefix matching picks it up first.
        location = /api/fact-check/stream {
            limit_req  zone=api_ai_strict  burst=2  nodelay;
            limit_conn conn_limit 3;       # Max 3 concurrent SSE streams per IP

            proxy_pass          http://express_backend;
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_set_header    X-Request-ID       $request_id;

            # ── SSE-critical settings ──────────────────────────────────────
            proxy_http_version  1.1;
            proxy_set_header    Connection         '';  # Disable keep-alive (SSE uses long-lived connection)
            proxy_buffering     off;               # Send chunks immediately — don't buffer
            proxy_cache         off;               # Never cache streaming responses
            proxy_read_timeout  300s;              # 5-min timeout for long AI streams
            proxy_send_timeout  300s;
            chunked_transfer_encoding on;
        }

        # ── General API routes → Express ──────────────────────────────────
        location /api/ {
            limit_req  zone=api_general  burst=20  nodelay;
            limit_conn conn_limit 10;

            proxy_pass          http://express_backend;
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_set_header    X-Request-ID       $request_id;
            proxy_http_version  1.1;
            proxy_set_header    Connection         '';
        }

        # ── Frontend — everything else → Next.js ──────────────────────────
        location / {
            limit_req  zone=api_general  burst=50  nodelay;

            proxy_pass          http://nextjs_frontend;
            proxy_set_header    Host               $host;
            proxy_set_header    X-Real-IP          $remote_addr;
            proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto  $scheme;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade            $http_upgrade;
            proxy_set_header    Connection         'upgrade'; # WebSocket (Next.js HMR in dev)
        }
    }

    # ==========================================================================
    # HTTPS server block — UNCOMMENT FOR PRODUCTION
    #
    # Prerequisites:
    #   1. Install certbot:   sudo apt install certbot python3-certbot-nginx
    #   2. Obtain cert:       sudo certbot --nginx -d your-domain.com
    #   3. Update server_name and ssl_certificate paths below
    #   4. Comment out the HTTP server block above (or keep it for redirect)
    # ==========================================================================
    # server {
    #     listen       443 ssl http2;
    #     server_name  your-domain.com;
    #
    #     ssl_certificate      /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key  /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #
    #     # Modern TLS config (Mozilla Intermediate)
    #     ssl_session_timeout  1d;
    #     ssl_session_cache    shared:MozSSL:10m;
    #     ssl_session_tickets  off;
    #     ssl_protocols        TLSv1.2 TLSv1.3;
    #     ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     # HSTS — tells browsers to only use HTTPS for 2 years
    #     # WARNING: only add 'preload' after testing — very hard to undo
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    #
    #     # -- Same location blocks as HTTP server above -- paste them here --
    # }
}

